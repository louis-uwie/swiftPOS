name: Deploy SwiftPOS to Azure

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create SSL cert
        run: |
          echo "${{ secrets.DB_SSL_CA_CONTENT }}" > ${{ github.workspace }}/ca.pem
          ls -la ${{ github.workspace }}/ca.pem

      - name: Run migrations
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_SSL_CA: ca.pem
        run: |
          python manage.py migrate --noinput

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Start Azure Web App
        run: |
          az webapp start \
            --resource-group swiftpos-api_group \
            --name swiftpos-api

      - name: Wait for app to start
        run: sleep 30

      - name: Zip application
        run: |
          zip -r app.zip . -x "*.git*" -x "venv/*"

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure App Service
        run: |
          az webapp deploy \
            --resource-group swiftpos-api_group \
            --name swiftpos-api \
            --src-path app.zip \
            --type zip
